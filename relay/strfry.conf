##
## strfry configuration — Scuffed Crew Nostr relay
##

db = "./strfry-db/"

relay {
    bind = "0.0.0.0"
    port = 7777

    info {
        name = "Scuffed Crew Relay"
        description = "Private Nostr relay for the Scuffed Crew gaming community"
        contact = ""
    }

    ## NIP-42 authentication: require AUTH for writing.
    ## Clients must complete AUTH handshake before publishing events.
    ## The relay sends AUTH challenges automatically; authenticated pubkey
    ## is passed to write-policy plugins via the "authed" field.

    ## Maximum WebSocket message size (bytes). Default: 131072 (128 KB).
    maxWebsocketPayloadSize = 131072

    ## Events older than this many seconds are rejected. 0 = no limit.
    rejectEventsOlderThanSeconds = 0

    ## Events newer than this many seconds in the future are rejected.
    rejectEventsNewerThanSeconds = 900

    ## Maximum number of tags per event.
    maxFilterTags = 2000

    writePolicy {
        ## strfry29 handles NIP-29 group management; relay-policy enforces
        ## member allowlist, kind whitelist, and rate limiting.
        ## strfry pipes events through plugins in order (left to right).
        plugin = "/usr/local/bin/strfry29 /usr/local/bin/relay-policy"
    }

    compression {
        enabled = true
        slidingWindow = true
    }

    logging {
        dumpInAll = false
        dumpInEvents = false
        dumpInReqs = false
    }

    numThreads {
        ingester = 3
        reqWorker = 3
        reqMonitor = 3
        negentropy = 2
    }

    negentropy {
        enabled = true
        maxSyncEvents = 1000000
    }
}
