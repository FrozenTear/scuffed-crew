services:
  surrealdb:
    image: surrealdb/surrealdb:v3.0
    # Image runs as non-root by default; Podman named volumes are root-owned,
    # which causes: Failed to create RocksDB directory: Permission denied.
    # Run as root in the container for single-tenant VPS deploys.
    user: "0:0"
    environment:
      SURREAL_USER: ${SURREALDB_USER:-root}
      SURREAL_PASS: ${SURREALDB_PASSWORD:?Set SURREALDB_PASSWORD (run scripts/install.sh)}
      SURREAL_BIND: 0.0.0.0:8000
    # Absolute path form (rocksdb:/data/...) so data lands on the volume.
    command: start rocksdb:/data/scuffed.db
    volumes:
      - surrealdb-data:/data
    networks:
      - internal
    # Image binary is /surreal (not always on PATH as "surreal"). HTTP /health
    # is the reliable readiness probe; is-ready CLI flags vary by version.
    healthcheck:
      test:
        [
          "CMD",
          "/surreal",
          "is-ready",
          "--endpoint",
          "http://127.0.0.1:8000",
        ]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 20s
    restart: unless-stopped

  strfry:
    profiles: ["relay"]
    build:
      context: .
      dockerfile: relay/Containerfile
    depends_on:
      surrealdb:
        condition: service_healthy
    environment:
      SURREALDB_URL: ws://surrealdb:8000
      SURREALDB_USER: ${SURREALDB_USER:-root}
      SURREALDB_PASSWORD: ${SURREALDB_PASSWORD:?Set SURREALDB_PASSWORD (run scripts/install.sh)}
      SURREALDB_NS: ${SURREALDB_NS:-scuffed_crew}
      SURREALDB_DB: ${SURREALDB_DB:-main}
    volumes:
      - strfry-data:/app/strfry-db
    networks:
      - internal
      - external
    ports:
      - "127.0.0.1:7777:7777"
    restart: unless-stopped

  site-server:
    build:
      context: .
      dockerfile: Containerfile
    depends_on:
      surrealdb:
        condition: service_healthy
    environment:
      SURREALDB_URL: ws://surrealdb:8000
      SURREALDB_USER: ${SURREALDB_USER:-root}
      SURREALDB_PASSWORD: ${SURREALDB_PASSWORD:?Set SURREALDB_PASSWORD (run scripts/install.sh)}
      SURREALDB_NS: ${SURREALDB_NS:-scuffed_crew}
      SURREALDB_DB: ${SURREALDB_DB:-main}
      DISCORD_CLIENT_ID: ${DISCORD_CLIENT_ID:-}
      DISCORD_CLIENT_SECRET: ${DISCORD_CLIENT_SECRET:-}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      REDIRECT_BASE_URL: ${REDIRECT_BASE_URL:-http://127.0.0.1:3000}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:-}
      ENCRYPTION_KEY_VERSION: ${ENCRYPTION_KEY_VERSION:-1}
      NOSTR_RELAY_URL: ${NOSTR_RELAY_URL:-}
      NOSTR_CHALLENGE_SECRET: ${NOSTR_CHALLENGE_SECRET:-}
      UPLOAD_DIR: /app/data/uploads
      PRODUCTION: ${PRODUCTION:-}
      SECURE_COOKIES: ${SECURE_COOKIES:-}
      BOOTSTRAP_ADMIN_RESET: ${BOOTSTRAP_ADMIN_RESET:-}
      BOOTSTRAP_ADMIN_PASSWORD: ${BOOTSTRAP_ADMIN_PASSWORD:-}
      BOOTSTRAP_ADMIN_USERNAME: ${BOOTSTRAP_ADMIN_USERNAME:-}
      RUST_LOG: ${RUST_LOG:-info}
    volumes:
      - uploads-data:/app/data/uploads
    networks:
      - internal
      - external
    ports:
      - "127.0.0.1:${HOST_PORT:-3000}:3000"
    restart: unless-stopped

networks:
  internal:
    internal: true
  external:

volumes:
  surrealdb-data:
  uploads-data:
  strfry-data:
