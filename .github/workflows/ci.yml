name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  dep-guardrails:
    name: Dependency Guardrails
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check for non-standard frontend deps
        run: bash scripts/check-frontend-deps.sh

  fmt:
    name: Rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libasound2-dev libudev-dev libwayland-dev libxkbcommon-dev \
            libvulkan-dev pkg-config

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
          targets: wasm32-unknown-unknown

      - uses: Swatinem/rust-cache@v2

      - name: Clippy (native crates)
        run: |
          cargo clippy \
            --workspace \
            --exclude scuffed-app \
            --exclude scuffed-stat-tracker \
            -- -D warnings

      - name: Clippy (WASM crates)
        run: |
          cargo clippy \
            --target wasm32-unknown-unknown \
            -p scuffed-app \
            -- -D warnings

  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libasound2-dev libudev-dev libwayland-dev libxkbcommon-dev \
            libvulkan-dev pkg-config

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - uses: Swatinem/rust-cache@v2

      - name: Build (native crates)
        run: cargo build --workspace --exclude scuffed-app --exclude scuffed-stat-tracker

      - name: Test (workspace)
        run: cargo test --workspace --exclude scuffed-app --exclude scuffed-stat-tracker

  app-build:
    name: App Build (Dioxus)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - uses: Swatinem/rust-cache@v2

      - name: Install dioxus-cli
        run: cargo install --locked dioxus-cli@0.7.4

      - name: Build app
        working-directory: crates/app
        run: dx build --release
