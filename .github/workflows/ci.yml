name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"
  TRUNK_VERSION: "0.21.14"

jobs:
  fmt:
    name: Rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libasound2-dev libudev-dev libwayland-dev libxkbcommon-dev \
            libvulkan-dev pkg-config

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
          targets: wasm32-unknown-unknown

      - uses: Swatinem/rust-cache@v2

      - name: Clippy (native crates)
        run: |
          cargo clippy \
            --workspace \
            --exclude scuffed-site \
            --exclude scuffed-admin \
            --exclude scuffed-app \
            -- -D warnings

      - name: Clippy (WASM crates)
        run: |
          cargo clippy \
            --target wasm32-unknown-unknown \
            -p scuffed-site \
            -p scuffed-admin \
            -- -D warnings

  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libasound2-dev libudev-dev libwayland-dev libxkbcommon-dev \
            libvulkan-dev pkg-config

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - uses: Swatinem/rust-cache@v2

      - name: Build (native crates)
        run: cargo build --workspace --exclude scuffed-site --exclude scuffed-admin --exclude scuffed-app

      - name: Test (workspace)
        run: cargo test --workspace --exclude scuffed-site --exclude scuffed-admin --exclude scuffed-app

  wasm-build:
    name: WASM Build (Trunk)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - uses: Swatinem/rust-cache@v2

      - name: Install trunk
        run: |
          curl -fsSL "https://github.com/trunk-rs/trunk/releases/download/v${TRUNK_VERSION}/trunk-x86_64-unknown-linux-gnu.tar.gz" \
            | tar -xzf - -C /usr/local/bin

      - name: Build site
        working-directory: crates/site
        run: trunk build

      - name: Build admin
        working-directory: crates/admin
        run: trunk build --features dev-noauth
