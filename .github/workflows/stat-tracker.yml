name: Stat Tracker CI

on:
  push:
    branches: [main]
    paths:
      - "crates/stat-tracker/**"
      - "crates/types/**"
      - ".github/workflows/stat-tracker.yml"
  pull_request:
    branches: [main]
    paths:
      - "crates/stat-tracker/**"
      - "crates/types/**"
      - ".github/workflows/stat-tracker.yml"

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

defaults:
  run:
    working-directory: crates/stat-tracker

jobs:
  fmt:
    name: Rustfmt (stat-tracker)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Rustfmt
        run: cargo fmt --check

  build-and-test:
    name: Build & Test (stat-tracker)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libwayland-dev libxkbcommon-dev \
            libegl-dev libgbm-dev \
            tesseract-ocr libtesseract-dev libleptonica-dev \
            libevdev-dev libudev-dev \
            pkg-config

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: crates/stat-tracker

      - name: Build
        run: cargo build

      - name: Test
        run: cargo test

  check-gui:
    # The GUI is feature-gated, so plain build/clippy never compiles it; only
    # the release workflow did, which let a broken GUI reach a tag (rc3).
    name: Check GUI feature (stat-tracker)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libwayland-dev libxkbcommon-dev \
            libegl-dev libgbm-dev \
            tesseract-ocr libtesseract-dev libleptonica-dev \
            libevdev-dev libudev-dev \
            libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev \
            libxdo-dev \
            pkg-config

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: crates/stat-tracker
          key: check-gui

      - name: Check (all targets, gui feature)
        run: cargo check --all-targets --features gui

  clippy:
    name: Clippy (stat-tracker)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libwayland-dev libxkbcommon-dev \
            libegl-dev libgbm-dev \
            tesseract-ocr libtesseract-dev libleptonica-dev \
            libevdev-dev libudev-dev \
            pkg-config

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: crates/stat-tracker

      - name: Clippy
        run: cargo clippy -- -D warnings
