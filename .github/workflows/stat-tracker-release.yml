name: Stat Tracker Release

# Prebuilt Linux binaries for the stat tracker, published as a GitHub Release.
# Trigger: push a tag like `stat-tracker-v0.1.0`, or run manually (dispatch
# builds from the chosen ref and publishes a draft release for inspection).
#
# Portability strategy (release must run on most Linux distros):
# - Daemon builds on ubuntu-22.04 → glibc floor 2.35 (covers Ubuntu 22.04+,
#   Debian 12+, Fedora, Arch, openSUSE, RHEL 9+).
# - tesseract/leptonica sonames are fragmented across distros (Ubuntu ships
#   liblept.so.5, Arch libleptonica.so.6), so the OCR library closure is
#   BUNDLED into the tarball's lib/ and binaries get RPATH $ORIGIN/../lib.
#   glibc-family / toolchain / compositor-stack libs stay host-provided.
# - The GUI needs webkit2gtk-4.1 (not packaged on 22.04) → separate job on
#   ubuntu-24.04; GUI therefore needs a modern distro, daemon does not.
# - Clean-room proof: the daemon job uninstalls the OCR packages after the
#   build and runs the staged binary purely from the bundled libs.

on:
  push:
    tags:
      - "stat-tracker-v*"
  workflow_dispatch:

permissions:
  contents: write

env:
  STAGE: scuffed-stat-tracker-linux-x86_64

jobs:
  build-daemon:
    name: Daemon (ubuntu-22.04, glibc 2.35 floor)
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libwayland-dev libxkbcommon-dev \
            libegl-dev libgbm-dev \
            tesseract-ocr libtesseract-dev libleptonica-dev \
            libevdev-dev libudev-dev \
            pkg-config patchelf

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          key: daemon-2204

      - name: Set release version env
        run: |
          set -euo pipefail
          if [[ "${GITHUB_REF_NAME}" == stat-tracker-v* ]]; then
            V="${GITHUB_REF_NAME#stat-tracker-v}"
          else
            V="dev-${GITHUB_SHA::8}"
          fi
          echo "SST_RELEASE_VERSION=${V}"
          echo "SST_RELEASE_VERSION=${V}" >> "$GITHUB_ENV"

      - name: Build daemon (release)
        working-directory: crates/stat-tracker
        run: cargo build --release --bin scuffed-stat-tracker

      - name: Bundle OCR library closure + set RPATH
        run: |
          set -euo pipefail
          mkdir -p out/bin out/lib
          cp target/release/scuffed-stat-tracker out/bin/
          # Seed the closure from the binary: pulls tesseract, leptonica, image
          # codecs, and their transitive deps with consistent versions. Shared
          # script also bundles/stamps for the GUI job (libxdo).
          bash crates/stat-tracker/dist/bundle-native-libs.sh \
            out/bin/scuffed-stat-tracker out/lib
          patchelf --set-rpath '$ORIGIN/../lib' out/bin/scuffed-stat-tracker

      - name: Clean-room smoke test (no system OCR libs)
        run: |
          set -euo pipefail
          sudo apt-get remove -y libtesseract-dev 'libtesseract*' libleptonica-dev 'liblept*' tesseract-ocr || true
          sudo apt-get autoremove -y || true
          out="$(./out/bin/scuffed-stat-tracker --version)"
          echo "smoke: ${out}"
          echo "${out}" | grep -qx "scuffed-stat-tracker ${SST_RELEASE_VERSION}" \
            || { echo "version mismatch: got '${out}', want scuffed-stat-tracker ${SST_RELEASE_VERSION}" >&2; exit 1; }
          echo "daemon runs with bundled OCR libs only"
          ldd ./out/bin/scuffed-stat-tracker | grep -iE 'tesseract|lept' || true

      - uses: actions/upload-artifact@v4
        with:
          name: daemon
          path: out/
          if-no-files-found: error

  build-gui:
    name: GUI (ubuntu-22.04, needs webkit2gtk-4.1)
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libwayland-dev libxkbcommon-dev \
            libegl-dev libgbm-dev \
            tesseract-ocr libtesseract-dev libleptonica-dev \
            libevdev-dev libudev-dev \
            libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev \
            libxdo-dev \
            pkg-config patchelf

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          key: gui-2404

      - name: Set release version env
        run: |
          set -euo pipefail
          if [[ "${GITHUB_REF_NAME}" == stat-tracker-v* ]]; then
            V="${GITHUB_REF_NAME#stat-tracker-v}"
          else
            V="dev-${GITHUB_SHA::8}"
          fi
          echo "SST_RELEASE_VERSION=${V}"
          echo "SST_RELEASE_VERSION=${V}" >> "$GITHUB_ENV"

      - name: Build GUI (release)
        working-directory: crates/stat-tracker
        run: cargo build --release --features gui --bin stat-tracker-gui

      - name: Bundle libxdo + set RPATH
        run: |
          set -euo pipefail
          mkdir -p out/bin out/lib
          cp target/release/stat-tracker-gui out/bin/
          # The GUI gets webkit2gtk-4.1, GTK, and the X11 client libs from the
          # host (release notes require a modern distro), so we bundle ONLY the
          # soname-fragmented lib the GUI can't get on Arch: libxdo (Ubuntu
          # ships libxdo.so.3, Arch libxdo.so.4). Its transitive deps are the
          # ABI-stable X11/xcb libs — denied so they stay host-provided.
          #
          # The shipped v0.1.0 GUI also had NO RPATH at all (only the daemon got
          # $ORIGIN/../lib), so it couldn't see bundled libs even if present;
          # the patchelf below fixes that.
          xdo="$(ldd out/bin/stat-tracker-gui | awk '/libxdo/ {print $3}')"
          [ -n "${xdo}" ] || { echo "libxdo not found in GUI deps" >&2; exit 1; }
          cp -n "${xdo}" out/lib/
          bash crates/stat-tracker/dist/bundle-native-libs.sh \
            "out/lib/$(basename "${xdo}")" out/lib '^libX|^libxcb'
          patchelf --set-rpath '$ORIGIN/../lib' out/bin/stat-tracker-gui

      - name: Clean-room ldd check (bundled libxdo, no system libxdo)
        run: |
          set -euo pipefail
          # Remove host libxdo so the RPATH must resolve it from the bundle.
          sudo apt-get remove -y 'libxdo*' libxdo-dev xdotool || true
          sudo apt-get autoremove -y || true
          echo "GUI ldd from extracted layout:"
          ldd ./out/bin/stat-tracker-gui || true
          if ldd ./out/bin/stat-tracker-gui | grep -i 'not found'; then
            echo "GUI has unresolved libraries after bundling" >&2
            exit 1
          fi
          xdo_line="$(ldd ./out/bin/stat-tracker-gui | awk '/libxdo/ {print $3}')"
          echo "libxdo resolves to: ${xdo_line}"
          # The loader reports the RUNPATH path unnormalized (out/bin/../lib/…),
          # so realpath both sides before comparing.
          xdo_real="$(realpath "${xdo_line:-/nonexistent}" 2>/dev/null || true)"
          bundle_dir="$(realpath ./out/lib)"
          case "${xdo_real}" in
            "${bundle_dir}"/*) echo "libxdo resolves to the bundled copy — OK" ;;
            *) echo "libxdo did NOT resolve to the bundled copy (got: ${xdo_real:-missing}, want prefix: ${bundle_dir}/)" >&2; exit 1 ;;
          esac
          # No headless launch probe: the Dioxus/webkit2gtk GUI has no --smoke
          # or --version flag (only the SST_VIEW env for view routing) and would
          # open a real window with no self-exit — a flaky gate, deliberately
          # omitted. The ldd assertion above is the ship gate for this class.

      - uses: actions/upload-artifact@v4
        with:
          name: gui
          path: out/
          if-no-files-found: error

  package-release:
    name: Package & Release
    needs: [build-daemon, build-gui]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: daemon
          path: daemon

      - uses: actions/download-artifact@v4
        with:
          name: gui
          path: gui

      - name: Assemble tarball
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#stat-tracker-v}"
          [ "${GITHUB_REF_NAME}" = "${VERSION}" ] && VERSION="dev-${GITHUB_SHA::8}"
          mkdir -p "${STAGE}/bin" "${STAGE}/lib"
          cp daemon/bin/scuffed-stat-tracker "${STAGE}/bin/"
          cp daemon/lib/* "${STAGE}/lib/" 2>/dev/null || true
          cp gui/bin/stat-tracker-gui "${STAGE}/bin/"
          cp gui/lib/* "${STAGE}/lib/" 2>/dev/null || true
          cp -r crates/stat-tracker/assets "${STAGE}/assets"
          cp crates/stat-tracker/dist/install.sh "${STAGE}/install.sh"
          chmod +x "${STAGE}/install.sh" "${STAGE}"/bin/*
          echo "${VERSION}" > "${STAGE}/VERSION"
          tar czf "${STAGE}.tar.gz" "${STAGE}"
          sha256sum "${STAGE}.tar.gz" > "${STAGE}.tar.gz.sha256"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          if [ "${GITHUB_EVENT_NAME}" = "push" ]; then
            TAG="${GITHUB_REF_NAME}"
            EXTRA_FLAGS=""
          else
            # Manual runs publish a draft; --target lets gh mint the tag itself.
            TAG="stat-tracker-manual-${GITHUB_SHA::8}"
            EXTRA_FLAGS="--draft --target ${GITHUB_SHA}"
          fi
          {
            echo "Prebuilt Linux x86_64 build of the Overwatch 2 stat tracker (daemon + GUI)."
            echo
            echo "**Daemon:** runs on any current systemd distro (glibc ≥ 2.35); OCR libraries are bundled."
            echo
            echo "**GUI:** needs a modern distro with \`webkit2gtk-4.1\` and glibc ≥ 2.39 (Ubuntu 24.04+, Debian 13, Arch, Fedora)."
            echo
            echo "**Also required:** Linux + Wayland (wlr-screencopy compositor or XDG portal), membership in the \`input\` group, distro \`eng.traineddata\` for OCR tuning."
            echo
            echo "**Install:** extract the tarball and run \`./install.sh\` inside it — no Rust toolchain needed."
          } > release-notes.md
          gh release create "${TAG}" ${EXTRA_FLAGS} \
            --title "Stat Tracker ${TAG#stat-tracker-}" \
            --notes-file release-notes.md \
            "${STAGE}.tar.gz" \
            "${STAGE}.tar.gz.sha256"
